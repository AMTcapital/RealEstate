name: Wednesday LinkedIn Post

on:
  schedule:
    # Runs at 9:00 AM every Wednesday (UTC)
    - cron: '0 9 * * 3'
  # Allows you to click "Run workflow" manually in the GitHub UI for testing
  workflow_dispatch:

# Permissions must be at the same level as 'on' and 'jobs'
permissions:
  contents: write

jobs:
  post-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for better security/speed

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run posting script
        env:
          L_TOKEN: ${{ secrets.L_TOKEN }}
          urn: ${{ secrets.urn }}
        run: python main.py

      - name: Commit updated JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Only commit if there are actually changes to quotes.json
          git add quotes.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update posted status [skip ci]"
            git push
          fi

      - name: Upload Image Preview
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-image-preview
          path: linkedin_preview.jpg
