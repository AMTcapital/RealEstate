name: Wednesday LinkedIn Post
on:
  schedule:
    # Runs at 9:00 AM every Wednesday (UTC)
    - cron: '0 9 * * 3'
  # Allows you to click "Run workflow" manually in the GitHub UI for testing
  workflow_dispatch:

jobs:
  post-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run posting script
        env:
          L_TOKEN: ${{ secrets.L_TOKEN }}
          urn: ${{ secrets.urn }}
        run: python main.py

      - name: Commit updated JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add quotes.json
          git commit -m "Update posted status [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
